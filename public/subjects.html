<!DOCTYPE html>
<html>
<head>
<title>Subjects</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== DARK GRADIENT BACKGROUND ===== */
body{
font-family:'Segoe UI';
margin:0;
padding:20px;
min-height:100vh;

background: linear-gradient(
135deg,
#0f0f1a,
#1c1c2e,
#2a2a40,
#1a1a2e
);

color:white;
}

/* ===== GLOW EFFECT ===== */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, rgba(255,140,0,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,191,255,0.15), transparent 40%);

z-index:-1;
}

/* ===== TITLE ===== */
h2{
text-align:center;
margin-bottom:30px;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

/* ===== CARD (GLASS STYLE) ===== */
.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:12px;

text-align:center;
cursor:pointer;

backdrop-filter:blur(12px);

box-shadow:0 10px 25px rgba(0,0,0,0.5);

transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 35px rgba(0,0,0,0.7);
}

/* ===== ICON ===== */
.card img{
width:70px;
height:70px;
margin-bottom:10px;
}

/* ===== TEXT ===== */
.card h3{
margin:10px 0;
}

/* ===== BUTTON ===== */
button{
display:block;
margin:30px auto;
padding:12px 20px;

background:#ff3c00;
color:white;

border:none;
border-radius:6px;

cursor:pointer;
}

button:hover{
background:#ff5722;
}

/* BACK BUTTON */
.back-btn{
position:absolute;
top:20px;
right:20px;

padding:8px 15px;

background:#ff3c00;
color:white;

border:none;
border-radius:6px;

cursor:pointer;
}

.back-btn:hover{
background:#ff5722;
}
</style>

</head>

<body>

    <button class="back-btn" onclick="goBack()">← BACK</button>

<h2>Select Subject</h2>

<div class="grid">

<div class="card" onclick="selectSubject('java')">
<img src="https://cdn-icons-png.flaticon.com/512/226/226777.png">
<h3>Java</h3>
</div>

<div class="card" onclick="selectSubject('python')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
<h3>Python</h3>
</div>

<div class="card" onclick="selectSubject('dsa')">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721293.png">
<h3>DSA</h3>
</div>

<div class="card" onclick="selectSubject('html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732212.png">
<h3>HTML & CSS</h3>
</div>

</div>

<button onclick="logout()">Logout</button>

<script>

/* PROTECT */
if(!localStorage.getItem("user")){
window.location.href="login.html";
}

function selectSubject(sub){
localStorage.setItem("subject",sub);
window.location.href="index.html";
}

function goBack(){
    window.location.href = "login.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>
</html>
