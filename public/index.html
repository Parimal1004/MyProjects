<!DOCTYPE html>
<html>
<head>
<title>Online Exam</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BACKGROUND ===== */
body{
font-family:'Segoe UI';
margin:0;
padding:20px;
min-height:100vh;

background: linear-gradient(
135deg,
#0f0f1a,
#1c1c2e,
#2a2a40,
#1a1a2e
);

display:flex;
justify-content:center;
}

/* ===== GLOW EFFECT ===== */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, rgba(255,140,0,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,191,255,0.15), transparent 40%);

z-index:-1;
}

/* ===== CONTAINER ===== */
.container{
width:95%;
max-width:750px;

background:rgba(255,255,255,0.05);
color:white;

padding:25px;
border-radius:14px;

backdrop-filter:blur(12px);

box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* ===== TITLE ===== */
h2{
text-align:center;
margin-bottom:10px;
}

/* ===== USER TEXT ===== */
#welcome{
text-align:center;
margin-bottom:10px;
color:#ccc;
}

/* ===== TIMER ===== */
#timer{
text-align:center;
font-size:18px;
font-weight:bold;
margin:10px 0;
color:#ffcc00;
}

/* ===== PROGRESS BAR ===== */
.progress-container{
width:100%;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

#progressBar{
height:100%;
width:100%;
background:green;
transition:1s linear;
}

/* ===== QUESTION ===== */
.question-box{
margin:15px 0;
padding:15px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

/* ===== OPTIONS ===== */
label{
display:block;
margin:6px 0;
cursor:pointer;
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:12px;
margin-top:10px;

background:#ff3c00;
color:white;

border:none;
border-radius:6px;

cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff5722;
}

/* ===== LOGOUT BUTTON ===== */
.logout-btn{
background:#444;
}

.logout-btn:hover{
background:#666;
}

</style>

</head>

<body>

<div class="container">

<h2>Online Exam</h2>

<p id="welcome"></p>

<div id="timer">Time: 60</div>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<form id="examForm"></form>

<button id="submitBtn" type="button" onclick="submitExam()">Submit Exam</button>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script>

/* 🔒 LOGIN CHECK */
if (!localStorage.getItem("user")) {
    window.location.href = "login.html";
}

/* 🔒 SUBJECT CHECK */
if (!localStorage.getItem("subject")) {
    window.location.href = "subjects.html";
}

/* 👤 SHOW USER */
document.getElementById("welcome").innerText =
"Welcome, " + localStorage.getItem("user");

/* 🚪 LOGOUT (FIXED) */
function logout(){
    localStorage.clear();   // 🔥 clears everything
    window.location.href = "login.html";
}

</script>

<script src="script.js"></script>

</body>
</html>
